<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="shortcut icon" href="./assets/img/logo-fav.svg">
		<title>Fortune</title>
		<script type="module" crossorigin="" src="./js/index.min.js?v=1779714970100"></script>
		<link rel="modulepreload" crossorigin="" href="./js/common.min.js?v=1779714970100">
		<link rel="stylesheet" crossorigin="" href="./css/index.min.css?v=1779714970100">
	</head>
	<body>
		<div class="wrapper">
			<header data-fls-header="" data-fls-header-scroll="" class="header">
				<div class="header__container">
					<div class="header__logo">
						<img src="./assets/img/logo.svg" alt="logo" class="header__image">
					</div>
					<div class="header__fruit-logo">
						<picture>
							<img alt="logo" class="header__image" src="./assets/img/fruit-logo.webp">
						</picture>
					</div>
				</div>
			</header>
			<main class="page">
				<!-- @format -->
				<main class="page--home home">
					<section class="page__hero hero">
						<div class="hero__inner">
							<div class="hero__titles">
								<h1 class="hero__title">
									<span>Gira la rueda y obtén</span>
									<p>tu bono ahora mismo!</p>
								</h1>
							</div>
							<div class="hero__wheel-layout">
								<div class="hero__bonus-items">
									<div class="hero__bonus-item hero__bonus-item--left">
										<span>850%</span>
										<p>con tu depósito de casino</p>
									</div>
									<div class="hero__bonus-item hero__bonus-item--right">
										<span>630</span>
										<p>Giros Gratis</p>
									</div>
								</div>
								<div class="hero__wheel-holder">
									<img src="./assets/img/hero/hero-wheel-holder%20.png" alt="" class="hero__holder-image">
								</div>
								<picture class="hero__wheel-picture">
									<picture>
										<img alt="" class="hero__wheel-image" src="./assets/img/hero/hero-wheel.webp">
									</picture>
								</picture>
								<button class="hero__spin-button" type="button" aria-label="Spin wheel">
									<picture>
										<img alt="" class="hero__spin-icon" src="./assets/img/hero/spin-btn.webp">
									</picture>
								</button>
								<div class="hero__win-frame">
									<picture>
										<img alt="" src="./assets/img/hero/wheel-win-frame.webp">
									</picture>
								</div>
							</div>
							<picture>
								<source media="(max-width: 600px)" srcset="./assets/img/hero/hero-orange-600.webp" type="image/webp">
								<img alt="" class="hero__character hero__character--orange" src="./assets/img/hero/hero-orange.webp">
							</picture>
							<picture>
								<img alt="" class="hero__character hero__character--strawberry" src="./assets/img/hero/hero-apple.webp">
							</picture>
							<picture>
								<source media="(max-width: 600px)" srcset="./assets/img/hero/fruits-600.webp" type="image/webp">
								<source media="(max-width: 1200px)" srcset="./assets/img/hero/fruits-1200.webp" type="image/webp">
								<img alt="" class="hero__fruits hero__fruits--desktop" src="./assets/img/hero/fruits.webp">
							</picture>
							<picture>
								<img alt="" class="hero__fruits hero__fruits--mobile" src="./assets/img/hero/fruits-mob.webp">
							</picture>
						</div>
					</section>
				</main>
			</main>
			<footer data-fls-footer="" class="footer">
				<div class="footer__container"></div>
			</footer>
		</div>
		<button type="button" data-fls-popup-link="popup" id="openRegistrationPopupButton" hidden></button>
		<div data-fls-popup="popup" aria-hidden="true" class="popup">
			<div data-fls-popup-wrapper="" class="popup__wrapper">
				<div data-fls-popup-body="" class="popup__body">
					<!-- <button data-fls-popup-close type="button" class="popup__close"><svg width="23" height="23" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity="0.850056" d="M1.73333 1.48883L21.5469 21.0288" stroke="#979797" stroke-linecap="square" /><path opacity="0.850056" d="M21.2667 1.48883L1.45309 21.0288" stroke="#979797" stroke-linecap="square" /></svg></button> -->
					<div data-fls-popup-content="" class="popup__content">
						<div class="popup__form form" aria-label="Registration form">
							<div class="form__content">
								<div class="form__shell-top">
									<div class="form__shell-brand">
										<img src="./assets/img/logo-form.svg" alt="" class="form__shell-brand-icon">
										<span class="form__shell-brand-text">Aprovechá</span>
									</div>
									<button class="form__shell-action form__shell-action--next" type="button" aria-label="Soporte">
										<span class="form__shell-support"></span>
									</button>
								</div>
								<div class="form__content-header">
									<h2 class="form__title">OBTENER BONIFICACIÓN</h2>
									<a href="https://cuatrobet.com/login" class="form__content-login">INICIAR SESIÓN</a>
									<div class="form__content-support">
										<div class="form__content-support-icon"></div>
									</div>
								</div>
								<button class="bonus-card" aria-label="Welcome bonus">
									<picture>
										<img srcset="./assets/img/bono_3@1x.webp 1x, ./assets/img/bono_3@2x.webp 2x" alt="User" class="bonus-card__icon" src="./assets/img/bono_3@1x.webp">
									</picture>
									<div class="bonus-card__body">
										<p class="bonus-card__top">
											<span class="bonus-card__badge">Bono</span>
											<span class="bonus-card__label">de Bienvenida para Slotsde Casino</span>
										</p>
										<p class="bonus-card__text">
											Bono de Slots de hasta 
                el
											<strong>850%</strong>
											<br>
											+
											<strong>630 GG</strong>
											con tu primer depósito
										</p>
									</div>
								</button>
								<form class="register-form" id="register-form" novalidate>
									<input type="hidden" name="selectedBonus" id="selected-bonus-input" value="">
									<input type="hidden" name="nnBonus" id="selected-bonus-code" value="3">
									<input type="hidden" name="selectedLanguage" value="es">
									<input type="hidden" name="defaultCurrency" value="ARS">
									<label class="field field--phone">
										<span class="field__phone-prefix" aria-hidden="true">
											<img src="./assets/img/svgicons/flag-argentina.svg" alt="" class="field__phone-flag">
										</span>
										<input type="tel" name="phone" placeholder="Número de teléfono" required inputmode="numeric">
										<span class="field__hidden-placeholder" aria-hidden="true">Número de teléfono</span>
										<span class="field__error">
											<img src="./assets/img/svgicons/error.svg" alt="error" class="field__error-icon">
											Ingresa un número de teléfono válido
										</span>
									</label>
									<label class="field field--email">
										<img src="./assets/img/svgicons/mail.svg" alt="email" class="field__icon">
										<input type="email" name="email" placeholder="Correo electrónico" required>
										<span class="field__hidden-placeholder" aria-hidden="true">Correo electrónico</span>
										<span class="field__error">
											<img src="./assets/img/svgicons/error.svg" alt="error" class="field__error-icon">
											Ingresa un correo electrónico válido
										</span>
									</label>
									<label class="field field--password">
										<img src="./assets/img/svgicons/psw.svg" alt="password" class="field__icon">
										<input type="password" name="password" placeholder="Contraseña" required minlength="8">
										<span class="field__hidden-placeholder" aria-hidden="true">Contraseña</span>
										<button class="field__toggle" type="button" aria-label="Show password">
											<img src="./assets/img/svgicons/eye.svg" alt="eye" class="field__eye">
										</button>
										<span class="field__error">
											<img src="./assets/img/svgicons/error.svg" alt="error" class="field__error-icon">
											Debe tener 8 caracteres
										</span>
									</label>
									<label class="check">
										<input type="checkbox" name="isAdult" id="isAdult" required checked>
										<span class="check__box" aria-hidden="true">
											<img src="./assets/img/svgicons/check.svg" alt="" class="check__icon">
										</span>
										<span class="check__text">
											<span>Soy mayor de 18 años y acepto</span>
											<a href="https://cuatrobet.com/terms-and-conditions">
												<strong>el contrato de oferta para la moneda elegida</strong>
											</a>
											<span class="field__error">
												<img src="./assets/img/svgicons/error.svg" alt="error" class="field__error-icon">
												Debes ser mayor de 18 años
											</span>
										</span>
									</label>
									<p class="register-form__error" id="register-form-error" role="alert" hidden></p>
									<button class="register-form__submit" type="submit">
										<span class="register-form__submit-text">APROVECHÁ</span>
										<svg width="426" height="72" viewbox="0 0 426 72" fill="none" xmlns="http://www.w3.org/2000/svg">
											<g clip-path="url(#clip0_52_1797)">
												<path d="M-386 -431L-282.874 -355.294L-275.874 -367.419L-172.75 -291.714L-165.75 -303.838L-62.6238 -228.133L-55.6238 -240.257L47.5022 -164.552L54.5022 -176.676L157.627 -100.971L164.627 -113.096L267.752 -37.39L274.752 -49.5144L377.878 26.1912L384.878 14.0669L488.003 89.7716L495.003 77.6472L598.129 153.353L605.129 141.228L708.255 216.934" stroke="stroke" stroke-width="2"></path>
												<path d="M-111 688.255L-35.2944 585.129L-47.4188 578.129L28.2859 475.005L16.1616 468.005L91.8672 364.879L79.7428 357.879L155.448 254.753L143.324 247.753L219.029 144.628L206.904 137.628L282.61 34.5024L270.486 27.5024L346.191 -75.6236L334.067 -82.6236L409.772 -185.748L397.647 -192.748L473.353 -295.874L461.228 -302.874L536.934 -406" stroke="stroke" stroke-width="2"></path>

												<path d="M-512 570.171L-412.183 490.153L-422.083 480.253L-322.267 400.237L-332.166 390.337L-232.349 310.319L-242.249 300.42L-142.432 220.402L-152.331 210.502L-52.5158 130.486L-62.4153 120.586L37.4017 40.5682L27.5022 30.6687L127.319 -49.3492L117.42 -59.2487L217.235 -139.265L207.336 -149.165L307.153 -229.183L297.253 -239.082L397.07 -319.1" stroke="stroke" stroke-width="2"></path>
											</g>
											<defs>
												<clipPath id="clip0_52_1797">
													<rect width="426" height="72" rx="12" fill="white"></rect>
												</clipPath>
											</defs>
										</svg>
									</button>
									<p class="register-form__signin">
										¿Ya tenés una cuenta?
										<a href="https://cuatrobet.com/login">Iniciar sesión</a>
									</p>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
